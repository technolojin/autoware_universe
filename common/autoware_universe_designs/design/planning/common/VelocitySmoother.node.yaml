autoware_system_design_format: 0.3.0
name: VelocitySmoother.node
package:
  name: autoware_velocity_smoother
  provider: autoware
launch:
  plugin: autoware::velocity_smoother::VelocitySmootherNode
  executable: velocity_smoother_node
subscribers:
  - name: trajectory
    message_type: autoware_planning_msgs/msg/Trajectory
  - name: external_velocity_limit_mps
    message_type: tier4_planning_msgs/msg/VelocityLimit
  - name: acceleration
    message_type: geometry_msgs/msg/AccelWithCovarianceStamped
  - name: operation_mode_state
    message_type: autoware_adapi_v1_msgs/msg/OperationModeState
publishers:
  - name: trajectory
    message_type: autoware_planning_msgs/msg/Trajectory
  - name: current_velocity_limit_mps
    message_type: tier4_planning_msgs/msg/VelocityLimit
param_files:
  - name: common_param
    default: $(find-pkg-share autoware_launch)/config/planning/scenario_planning/common/common.param.yaml
  - name: nearest_search_param
    default: $(find-pkg-share autoware_launch)/config/planning/scenario_planning/common/nearest_search.param.yaml
  - name: velocity_smoother_param
    default: $(find-pkg-share autoware_launch)/config/planning/scenario_planning/common/autoware_velocity_smoother/velocity_smoother.param.yaml
  - name: velocity_smoother_type_param
    default: $(find-pkg-share autoware_launch)/config/planning/scenario_planning/common/autoware_velocity_smoother/Analytical.param.yaml
param_values:
  - name: algorithm_type
    type: string
    default: Analytical
  - name: publish_debug_trajs
    type: bool
    default: false
processes:
  - name: smooth_velocity
    trigger_conditions:
      - on_input: trajectory
    outcomes:
      - to_output: trajectory
