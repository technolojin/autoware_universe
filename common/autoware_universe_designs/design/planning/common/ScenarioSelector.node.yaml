autoware_system_design_format: 0.3.0
name: ScenarioSelector.node
package:
  name: autoware_scenario_selector
  provider: autoware
launch:
  plugin: autoware::scenario_selector::ScenarioSelectorNode
  executable: autoware_scenario_selector_node
subscribers:
  - name: lane_driving_trajectory
    message_type: autoware_planning_msgs/msg/Trajectory
  - name: parking_trajectory
    message_type: autoware_planning_msgs/msg/Trajectory
  - name: lanelet_map
    message_type: autoware_map_msgs/msg/LaneletMapBin
  - name: route
    message_type: autoware_planning_msgs/msg/LaneletRoute
  - name: odometry
    message_type: nav_msgs/msg/Odometry
  - name: operation_mode_state
    message_type: autoware_adapi_v1_msgs/msg/OperationModeState
  - name: is_parking_completed
    message_type: std_msgs/msg/Bool
publishers:
  - name: scenario
    message_type: tier4_planning_msgs/msg/Scenario
  - name: trajectory
    message_type: autoware_planning_msgs/msg/Trajectory
param_files:
  - name: scenario_selector_param
    default: $(find-pkg-share autoware_scenario_selector)/config/scenario_selector.param.yaml
param_values: []
processes:
  - name: select_scenario
    trigger_conditions:
      - on_input: odometry
      - periodic: 10.0
    outcomes:
      - to_output: scenario
      - to_output: trajectory
