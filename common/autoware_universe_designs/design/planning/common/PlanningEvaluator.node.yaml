autoware_system_design_format: 0.3.0

name: PlanningEvaluator.node
package:
  name: autoware_planning_evaluator
  provider: autoware
launch:
  plugin: autoware::planning_evaluator::PlanningEvaluatorNode
  executable: planning_evaluator_node
  use_container: true
  container_name: planning_container
subscribers:
  - name: trajectory
    message_type: autoware_planning_msgs/msg/Trajectory
  - name: reference_trajectory
    message_type: autoware_planning_msgs/msg/Trajectory
  - name: odometry
    message_type: nav_msgs/msg/Odometry
publishers:
  - name: metrics
    message_type: autoware_planning_msgs/msg/PlanningAnalysis
param_files:
  - name: planning_evaluator_param
    default: $(find-pkg-share autoware_planning_evaluator)/config/planning_evaluator.param.yaml
param_values: []
processes:
  - name: evaluate
    trigger_conditions:
      - on_input: trajectory
    outcomes:
      - to_output: metrics
