autoware_system_design_format: 0.3.0
name: SurroundObstacleChecker.node
package:
  name: autoware_surround_obstacle_checker
  provider: autoware
launch:
  plugin: autoware::surround_obstacle_checker::SurroundObstacleCheckerNode
  executable: autoware_surround_obstacle_checker_node
subscribers:
  - name: odometry
    message_type: nav_msgs/msg/Odometry
  - name: objects
    message_type: autoware_perception_msgs/msg/PredictedObjects
  - name: pointcloud
    message_type: sensor_msgs/msg/PointCloud2
publishers:
  - name: max_velocity
    message_type: tier4_planning_msgs/msg/VelocityLimit
  - name: velocity_limit_clear_command
    message_type: tier4_planning_msgs/msg/VelocityLimitClearCommand
  - name: stop_reasons
    message_type: tier4_planning_msgs/msg/StopReasonArray
  - name: no_start_reason
    message_type: tier4_planning_msgs/msg/StopReasonArray
param_files:
  - name: common_param
    default: $(find-pkg-share autoware_launch)/config/planning/scenario_planning/common/common.param.yaml
  - name: vehicle_param
    default: $(find-pkg-share autoware_launch)/config/vehicle_info.param.yaml
  - name: nearest_search_param
    default: $(find-pkg-share autoware_launch)/config/planning/scenario_planning/common/nearest_search.param.yaml
  - name: surround_obstacle_checker_param
    default: $(find-pkg-share autoware_launch)/config/planning/scenario_planning/lane_driving/motion_planning/surround_obstacle_checker/surround_obstacle_checker.param.yaml
param_values: []
processes:
  - name: check_surroundings
    trigger_conditions:
      - on_input: odometry
      - periodic: 10.0
    outcomes:
      - to_output: max_velocity
