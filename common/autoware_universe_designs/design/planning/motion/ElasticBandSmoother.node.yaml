autoware_system_design_format: 0.3.0
name: ElasticBandSmoother.node
package:
  name: autoware_path_smoother
  provider: autoware
launch:
  plugin: autoware::path_smoother::ElasticBandSmoother
  executable: elastic_band_smoother
subscribers:
  - name: path
    message_type: autoware_planning_msgs/msg/Path
  - name: odometry
    message_type: nav_msgs/msg/Odometry
publishers:
  - name: path
    message_type: autoware_planning_msgs/msg/Path
param_files:
  - name: common_param
    default: $(find-pkg-share autoware_launch)/config/planning/scenario_planning/common/common.param.yaml
  - name: nearest_search_param
    default: $(find-pkg-share autoware_launch)/config/planning/scenario_planning/common/nearest_search.param.yaml
  - name: vehicle_param
    default: $(find-pkg-share autoware_launch)/config/vehicle_info.param.yaml
  - name: elastic_band_smoother_param
    default: $(find-pkg-share autoware_launch)/config/planning/scenario_planning/lane_driving/motion_planning/path_smoother/elastic_band_smoother.param.yaml
param_values: []
processes:
  - name: smooth_path
    trigger_conditions:
      - on_input: path
    outcomes:
      - to_output: path
