autoware_system_design_format: 0.3.0
name: PathSampler.node
package:
  name: autoware_path_sampler
  provider: autoware
launch:
  plugin: autoware::path_sampler::PathSampler
  executable: path_sampler_exe
subscribers:
  - name: path
    message_type: autoware_planning_msgs/msg/Path
  - name: odometry
    message_type: nav_msgs/msg/Odometry
  - name: objects
    message_type: autoware_perception_msgs/msg/PredictedObjects
publishers:
  - name: trajectory
    message_type: autoware_planning_msgs/msg/Trajectory
param_files:
  - name: path_sampler_param
    default: $(find-pkg-share autoware_path_sampler)/config/path_sampler.param.yaml
param_values: []
processes:
  - name: sample_path
    trigger_conditions:
      - on_input: path
    outcomes:
      - to_output: trajectory
