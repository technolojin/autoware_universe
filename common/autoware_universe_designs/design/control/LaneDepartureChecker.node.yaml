autoware_system_design_format: 0.3.0
name: LaneDepartureChecker.node
package:
  name: autoware_lane_departure_checker
  provider: autoware
launch:
  plugin: autoware::lane_departure_checker::LaneDepartureCheckerNode
  executable: lane_departure_checker_node
subscribers:
  - name: odometry
    message_type: nav_msgs/msg/Odometry
  - name: lanelet_map_bin
    message_type: autoware_map_msgs/msg/LaneletMapBin
  - name: route
    message_type: autoware_planning_msgs/msg/LaneletRoute
  - name: reference_trajectory
    message_type: autoware_planning_msgs/msg/Trajectory
  - name: predicted_trajectory
    message_type: autoware_planning_msgs/msg/Trajectory
publishers:
  - name: diagnostic
    message_type: diagnostic_msgs/msg/DiagnosticStatus
param_files:
  - name: nearest_search_param
    default: $(find-pkg-share autoware_launch)/config/control/common/nearest_search.param.yaml
  - name: lane_departure_checker_param
    default: $(find-pkg-share autoware_launch)/config/control/lane_departure_checker/lane_departure_checker.param.yaml
  - name: vehicle_param
    default: $(find-pkg-share autoware_launch)/config/vehicle_info.param.yaml
param_values: []
processes:
  - name: check_departure
    trigger_conditions:
      - on_input: odometry
    outcomes:
      - to_output: diagnostic
