autoware_system_design_format: 0.3.0
name: OperationModeTransitionManager.node
package:
  name: autoware_operation_mode_transition_manager
  provider: autoware
launch:
  plugin: autoware::operation_mode_transition_manager::OperationModeTransitionManager
  executable: autoware_operation_mode_transition_manager_exe
subscribers:
  - name: kinematics
    message_type: nav_msgs/msg/Odometry
  - name: steering
    message_type: autoware_vehicle_msgs/msg/SteeringReport
  - name: trajectory
    message_type: autoware_planning_msgs/msg/Trajectory
  - name: control_cmd
    message_type: autoware_control_msgs/msg/Control
  - name: trajectory_follower_control_cmd
    message_type: autoware_control_msgs/msg/Control
  - name: control_mode_report
    message_type: autoware_vehicle_msgs/msg/ControlModeReport
  - name: gate_operation_mode
    message_type: tier4_control_msgs/msg/GateMode
    remap_target: gate_operation_mode
  - name: engage
    message_type: autoware_vehicle_msgs/msg/Engage
    global: /autoware/engage
publishers:
  - name: operation_mode
    message_type: autoware_adapi_v1_msgs/msg/OperationModeState
    global: /system/operation_mode/state
  - name: engage
    message_type: autoware_vehicle_msgs/msg/Engage
    global: /autoware/engage
  - name: is_autonomous_available
    message_type: std_msgs/msg/Bool

clients:
  - name: control_mode_request
    message_type: autoware_vehicle_msgs/srv/ControlModeCommand
param_files:
  - name: nearest_search_param
    default: $(find-pkg-share autoware_launch)/config/control/common/nearest_search.param.yaml
  - name: operation_mode_transition_manager_param
    default: $(find-pkg-share autoware_launch)/config/control/operation_mode_transition_manager/operation_mode_transition_manager.param.yaml
  - name: vehicle_param
    default: $(find-pkg-share autoware_launch)/config/vehicle_info.param.yaml
param_values: []
processes:
  - name: manage_transition
    trigger_conditions:
      - periodic: 10.0
    outcomes:
      - to_process: control_mode_request
